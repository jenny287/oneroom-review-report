name: Build & deploy review report

# 전체 자동화: ① 최근 리뷰 수집 → ② 정제·내보내기(공개 CSV) → ③ 리포트 생성·배포
#
# 필요한 저장소 설정 (Settings → Secrets and variables → Actions):
#  [Variables]
#   - SUPABASE_FUNC_BASE : https://cpnssvebqfhmczszceqk.supabase.co/functions/v1   (dev 기준)
#   - REVIEW_CSV_URL     : https://cpnssvebqfhmczszceqk.supabase.co/storage/v1/object/public/review-reports/review_export_latest.csv
#  [Secrets]
#   - SUPABASE_ANON_KEY  : dev 프로젝트의 anon key (함수 호출 인증용)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'   # 매일 05:00 KST (UTC 20:00)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  REPORT_DAYS: "90"     # index.html 기본 기간 (build_site 내부 프리셋과 별개로 core 기본값)
  COLLECT_DAYS: "7"     # ① 증분 수집: 최근 며칠치를 가져올지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: install deps
        run: pip install -r scripts/requirements.txt

      - name: "1) collect recent reviews"
        continue-on-error: true     # 수집 실패해도 기존 데이터로 리포트는 생성
        run: |
          START=$(date -u -d "${COLLECT_DAYS} days ago" +%Y-%m-%d)
          END=$(date -u +%Y-%m-%d)
          echo "collect $START ~ $END"
          curl -sS -X POST "${{ vars.SUPABASE_FUNC_BASE }}/cafe24-review-collect" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"start_date\":\"$START\",\"end_date\":\"$END\"}"

      - name: "2) export cleaned CSV"
        continue-on-error: true     # 내보내기 실패해도 직전 공개 CSV로 리포트 생성
        run: |
          curl -sS -X POST "${{ vars.SUPABASE_FUNC_BASE }}/review-export" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" -d "{}"

      - name: "3) build site (all periods + months)"
        run: python scripts/build_site.py "${{ vars.REVIEW_CSV_URL }}" site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
