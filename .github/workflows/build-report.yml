name: Build & deploy review report

# 동작:
#  - 수동 실행(Run workflow) 또는 (아래) 스케줄로 트리거
#  - Supabase에 올라간 공개 CSV(review-export 결과)를 받아 리포트 생성 → Pages 배포
#
# 데이터 출처 URL은 저장소 변수 REVIEW_CSV_URL 로 주입한다.
#  (Settings → Secrets and variables → Actions → Variables → New variable)
#  값 예: https://cpnssvebqfhmczszceqk.supabase.co/storage/v1/object/public/review-reports/review_export_latest.csv
on:
  workflow_dispatch:
  # 데이터 자동 수집(①②)까지 연결한 뒤 아래 스케줄을 활성화한다.
  # schedule:
  #   - cron: '0 20 * * *'   # 매일 05:00 KST (UTC 20:00)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  REPORT_DAYS: "90"   # 최근 N일 리포트. 전체 기간으로 하려면 "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: install deps
        run: pip install -r scripts/requirements.txt
      - name: build report (public CSV -> site/index.html)
        run: python scripts/build_report_db.py "${{ vars.REVIEW_CSV_URL }}" site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
